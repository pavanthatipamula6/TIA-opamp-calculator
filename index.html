```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TIA Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
}

.row{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    font-size:18px;
    cursor:pointer;
}

.results{
    margin-top:25px;
    padding:20px;
    background:#eef4ff;
    border-radius:8px;
}

.ok{
    color:green;
    font-weight:bold;
}

.bad{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Photodiode TIA Calculator</h1>

<div class="row">
<label>Photodiode Minimum Current (µA)</label>
<input id="imin" value="0">
</div>

<div class="row">
<label>Photodiode Maximum Current (µA)</label>
<input id="imax" value="10">
</div>

<div class="row">
<label>Output Voltage Minimum (V)</label>
<input id="vmin" value="0.5">
</div>

<div class="row">
<label>Output Voltage Maximum (V)</label>
<input id="vmax" value="4.5">
</div>

<div class="row">
<label>Desired Bandwidth (Hz)</label>
<input id="bw" value="10000">
</div>

<div class="row">
<label>Photodiode Capacitance (pF)</label>
<input id="cp" value="20">
</div>

<div class="row">
<label>VCC (V)</label>
<input id="vcc" value="5">
</div>

<div class="row">
<label>VEE (V)</label>
<input id="vee" value="0">
</div>

<button onclick="calculate()">Calculate</button>

<div class="results" id="result">
Enter values and click Calculate
</div>

</div>

<script>

const E96 = [
100,102,105,107,110,113,115,118,121,124,
127,130,133,137,140,143,147,150,154,158,
162,165,169,174,178,182,187,191,196,200,
205,210,215,221,226,232,237,243,249,255,
261,267,274,280,287,294,301,309,316,324,
332,340,348,357,365,374,383,392,402,412,
422,432,442,453,464,475,487,499,511,523,
536,549,562,576,590,604,619,634,649,665,
681,698,715,732,750,768,787,806,825,845,
866,887,909,931,953,976
];

function nearestE96(value)
{
    let decade = Math.pow(10,Math.floor(Math.log10(value))-2);

    let normalized = value/decade;

    let best = E96[0];
    let error = Math.abs(normalized-E96[0]);

    for(let r of E96)
    {
        let e = Math.abs(normalized-r);

        if(e < error)
        {
            error = e;
            best = r;
        }
    }

    return best*decade;
}

function formatR(r)
{
    if(r >= 1e6)
        return (r/1e6).toFixed(3)+" MΩ";

    if(r >= 1e3)
        return (r/1e3).toFixed(3)+" kΩ";

    return r.toFixed(2)+" Ω";
}

function formatC(c)
{
    if(c < 1e-9)
        return (c*1e12).toFixed(2)+" pF";

    return (c*1e9).toFixed(2)+" nF";
}

function formatBW(bw)
{
    if(bw >= 1e6)
        return (bw/1e6).toFixed(3)+" MHz";

    if(bw >= 1e3)
        return (bw/1e3).toFixed(3)+" kHz";

    return bw.toFixed(2)+" Hz";
}

function calculate()
{
    let imin =
        parseFloat(document.getElementById("imin").value)*1e-6;

    let imax =
        parseFloat(document.getElementById("imax").value)*1e-6;

    let vmin =
        parseFloat(document.getElementById("vmin").value);

    let vmax =
        parseFloat(document.getElementById("vmax").value);

    let bw =
        parseFloat(document.getElementById("bw").value);

    let cp =
        parseFloat(document.getElementById("cp").value)*1e-12;

    let vcc =
        parseFloat(document.getElementById("vcc").value);

    let vee =
        parseFloat(document.getElementById("vee").value);

    let rf =
        (vmax-vmin)/(imax-imin);

    let cf =
        1/(2*Math.PI*rf*bw);

    let actual_bw =
        1/(2*Math.PI*rf*cf);

    let e96 =
        nearestE96(rf);

    let swing;

    if(vmax < (vcc-0.2) && vmin > (vee+0.2))
    {
        swing =
        "<span class='ok'>PASS</span>";
    }
    else
    {
        swing =
        "<span class='bad'>FAIL</span>";
    }

    document.getElementById("result").innerHTML =
    `
    <h2>Results</h2>

    <b>Feedback Resistor (R1)</b><br>
    ${formatR(rf)}
    <br><br>

    <b>Nearest E96 Value</b><br>
    ${formatR(e96)}
    <br><br>

    <b>Feedback Capacitor (C1)</b><br>
    ${formatC(cf)}
    <br><br>

    <b>Calculated Bandwidth</b><br>
    ${formatBW(actual_bw)}
    <br><br>

    <b>Photodiode Capacitance</b><br>
    ${formatC(cp)}
    <br><br>

    <b>Output Swing Check</b><br>
    ${swing}
    `;
}

</script>

</body>
</html>
```
