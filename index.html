```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TIA Design Calculator</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f0f2f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#1e3a8a;
}

.row{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.results{
    margin-top:25px;
    padding:20px;
    background:#eef4ff;
    border-radius:10px;
}

.pass{
    color:green;
    font-weight:bold;
}

.fail{
    color:red;
    font-weight:bold;
}

.resultLine{
    margin-bottom:12px;
}

</style>
</head>

<body>

<div class="container">

<h1>Transimpedance Amplifier Calculator</h1>

<div class="row">
<label>Input Current Minimum (µA)</label>
<input id="imin" value="0">
</div>

<div class="row">
<label>Input Current Maximum (µA)</label>
<input id="imax" value="50">
</div>

<div class="row">
<label>Output Voltage Minimum (V)</label>
<input id="vomin" value="0">
</div>

<div class="row">
<label>Output Voltage Maximum (V)</label>
<input id="vomax" value="5">
</div>

<div class="row">
<label>Bandwidth fp (Hz)</label>
<input id="fp" value="10000">
</div>

<div class="row">
<label>Total Input Capacitance Ci (pF)</label>
<input id="ci" value="6">
</div>

<div class="row">
<label>VCC (V)</label>
<input id="vcc" value="15">
</div>

<div class="row">
<label>VEE (V)</label>
<input id="vee" value="-15">
</div>

<button onclick="calculate()">
Calculate
</button>

<div class="results" id="result">
Enter values and press Calculate
</div>

</div>

<script>

const E12Caps = [
1.0,1.2,1.5,1.8,2.2,2.7,
3.3,3.9,4.7,5.6,6.8,8.2
];

function nearestStandardCap(valuePF)
{
    let decade =
    Math.pow(
        10,
        Math.floor(Math.log10(valuePF))
    );

    let normalized =
    valuePF / decade;

    let selected = E12Caps[0];

    for(let i=0;i<E12Caps.length;i++)
    {
        if(E12Caps[i] <= normalized)
        {
            selected = E12Caps[i];
        }
    }

    return selected * decade;
}

function calculate()
{
    let imin =
    parseFloat(document.getElementById("imin").value);

    let imax =
    parseFloat(document.getElementById("imax").value);

    let vomin =
    parseFloat(document.getElementById("vomin").value);

    let vomax =
    parseFloat(document.getElementById("vomax").value);

    let fp =
    parseFloat(document.getElementById("fp").value);

    let ci_pf =
    parseFloat(document.getElementById("ci").value);

    let vcc =
    parseFloat(document.getElementById("vcc").value);

    let vee =
    parseFloat(document.getElementById("vee").value);

    //-----------------------------------
    // Step 1
    //-----------------------------------

    let r1 =
    (vomax - vomin) /
    ((imax - imin) * 1e-6);

    //-----------------------------------
    // Step 2
    //-----------------------------------

    let c1 =
    1 /
    (2 * Math.PI * r1 * fp);

    let c1_pf =
    c1 * 1e12;

    let c1_standard_pf =
    nearestStandardCap(c1_pf);

    //-----------------------------------
    // Step 3
    //-----------------------------------

    let c1_standard_f =
    c1_standard_pf * 1e-12;

    let ci_f =
    ci_pf * 1e-12;

    let gbw =
    (ci_f + c1_standard_f) /
    (
        2 *
        Math.PI *
        r1 *
        Math.pow(c1_standard_f,2)
    );

    //-----------------------------------
    // Supply Check
    //-----------------------------------

    let swingCheck;

    if(vomax < vcc && vomin > vee)
    {
        swingCheck =
        "<span class='pass'>PASS</span>";
    }
    else
    {
        swingCheck =
        "<span class='fail'>FAIL</span>";
    }

    //-----------------------------------
    // Formatting
    //-----------------------------------

    let r1Text;

    if(r1 >= 1e6)
        r1Text = (r1/1e6).toFixed(3) + " MΩ";
    else
        r1Text = (r1/1000).toFixed(3) + " kΩ";

    let gbwText;

    if(gbw >= 1e6)
        gbwText = (gbw/1e6).toFixed(3) + " MHz";
    else if(gbw >= 1e3)
        gbwText = (gbw/1e3).toFixed(3) + " kHz";
    else
        gbwText = gbw.toFixed(3) + " Hz";

    //-----------------------------------
    // Output
    //-----------------------------------

    document.getElementById("result").innerHTML =

    "<h2>Results</h2>" +

    "<div class='resultLine'><b>Step 1 : R1</b><br>" +
    r1Text +
    "</div>" +

    "<div class='resultLine'><b>Step 2 : Calculated C1</b><br>" +
    c1_pf.toFixed(2) +
    " pF</div>" +

    "<div class='resultLine'><b>Selected Standard C1</b><br>" +
    c1_standard_pf.toFixed(0) +
    " pF</div>" +

    "<div class='resultLine'><b>Step 3 : Minimum GBW</b><br>" +
    gbwText +
    "</div>" +

    "<div class='resultLine'><b>Output Swing Check</b><br>" +
    swingCheck +
    "</div>";
}

calculate();

</script>

</body>
</html>
